# Netlify Configuration File

# Build settings
[build]
  publish = "dist"
  command = "npm run build"

# Redirect rules for single-page application routing (equivalent to _redirects file)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom security and caching headers for Technical SEO and Core Web Vitals
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), magnetometer=(), gyroscope=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
